services:
  postgres:
    image: postgres:16-alpine
    container_name: techdigest-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: techdigest
      POSTGRES_PASSWORD: techdigest_secret
      POSTGRES_DB: techdigest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techdigest -d techdigest"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techdigest-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://techdigest:techdigest_secret@postgres:5432/techdigest
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      WHATSAPP_PROVIDER: baileys
      SCHEDULE_CRON: ${SCHEDULE_CRON:-0 11 * * *}
      SCHEDULE_TIMEZONE: ${SCHEDULE_TIMEZONE:-Asia/Kolkata}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    container_name: techdigest-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend

volumes:
  postgres_data:
